<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=380">
<title>音声薬歴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;min-height:200px;font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:#f8fafc;color:#0f172a}
.header{background:linear-gradient(135deg,#0d9488,#0f766e);padding:12px 16px;display:flex;align-items:center;gap:10px;color:#fff}
.header-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px}
.header-title{font-size:14px;font-weight:800}
.header-sub{font-size:10px;opacity:.8}
.header-right{margin-left:auto;display:flex;gap:6px}
.btn-sm{background:rgba(255,255,255,.2);border:none;border-radius:6px;padding:4px 8px;color:#fff;font-size:10px;font-weight:700;cursor:pointer}
.btn-sm:hover{background:rgba(255,255,255,.3)}
.content{padding:12px}
.login-box{background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0;margin-bottom:12px}
.login-title{font-size:15px;font-weight:800;text-align:center;margin-bottom:14px;color:#0f766e}
.input{width:100%;padding:8px 10px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;margin-bottom:8px}
.input:focus{border-color:#0d9488}
.input-mono{font-family:monospace;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.btn{width:100%;padding:9px;background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
.btn-rec{width:100%;padding:12px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-rec.recording{background:linear-gradient(135deg,#f59e0b,#d97706);animation:pulse 1.5s infinite}
.btn-stop{background:linear-gradient(135deg,#475569,#334155)}
.card{background:#fff;border-radius:10px;padding:10px 12px;border:1px solid #e8ecf0;margin-bottom:8px;cursor:pointer}
.card:hover{border-color:#0d9488}
.card-title{font-size:12px;font-weight:700;color:#0f172a;margin-bottom:2px}
.card-sub{font-size:10px;color:#94a3b8}
.soap-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:3px}
.status{text-align:center;padding:8px;font-size:11px;font-weight:600;border-radius:8px;margin-bottom:8px}
.status-ok{background:#ecfdf5;color:#059669}
.status-err{background:#fef2f2;color:#dc2626}
.status-info{background:#f0f9ff;color:#2563eb}
.empty{text-align:center;padding:24px;color:#94a3b8;font-size:12px}
.detail{background:#fff;border-radius:10px;padding:12px;border:1px solid #e8ecf0}
.detail-field{margin-bottom:8px}
.detail-label{font-size:10px;font-weight:700;margin-bottom:2px}
.detail-text{font-size:12px;line-height:1.6;white-space:pre-wrap;color:#334155}
.btn-copy{width:100%;padding:8px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-paste{width:100%;padding:8px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px}
.back-btn{background:none;border:none;font-size:11px;color:#64748b;cursor:pointer;margin-bottom:8px;font-weight:700}
.timer{font-size:24px;font-weight:800;text-align:center;color:#dc2626;margin:8px 0;font-family:monospace}
.patient-input{display:flex;gap:6px;margin-bottom:10px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="app"></div>
<script src="popup.js"></script>
</body>
</html>
